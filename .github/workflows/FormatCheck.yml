name: format-check
on:
  push:
    branches:
      - 'master'
      - 'main'
      - 'release-'
    tags: '*'
  pull_request:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != format('refs/heads/{0}', github.event.repository.default_branch) }}
jobs:
  runic:
    name: Runic formatting
    uses: "SciML/.github/.github/workflows/runic.yml@v1"
    secrets: "inherit"
